name: CI - Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Clean npm auth and configs
        run: |
          rm -f ~/.npmrc
          npm config delete registry || true
          npm config delete always-auth || true
          npm config delete //registry.npmjs.org/:_authToken || true

      - name: Clean node_modules
        run: |
          rm -rf node_modules
          find ./src -maxdepth 2 -type d -name node_modules -prune -exec rm -rf {} +

      - name: Install dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Run tests
        run: npm run test
